version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 24
        - node --version
        - node --version
        - npm --version
        - npm install
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - "**/*"
  cache:
    paths:
      - .npm/**/*
